<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service On The Way</title>
  <link href="./output.css" rel="stylesheet" />
  <script>
    let countdown;
    window.onload = function() {
      let timer = 120;
      const countdownDisplay = document.getElementById("countdown");

      countdown = setInterval(() => {
        const minutes = Math.floor(timer / 60);
        const seconds = timer % 60;
        countdownDisplay.textContent = `${minutes}m ${seconds < 10 ? '0' : ''}${seconds}s`;

        if (timer <= 0) {
          clearInterval(countdown);
          countdownDisplay.textContent = "Arrived!";
        }

        timer--;
      }, 1000);
    };
  </script>
  <script>
    if (!localStorage.getItem('theme_forced_v3')) {
      localStorage.theme = 'dark';
      localStorage.setItem('theme_forced_v3', 'true');
    }
    if (localStorage.theme === 'light') {
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }
    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        document.documentElement.classList.add('dark');
        localStorage.theme = 'dark';
      }
    }
  </script>
</head>
<body class="bg-gradient-to-r from-purple-400 to-violet-600 dark:from-gray-900 dark:to-gray-800 min-h-screen flex items-center justify-center transition-colors duration-300">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-10 text-center max-w-md w-full border border-transparent dark:border-gray-700 transition-colors">
    <h1 class="text-3xl font-bold text-green-600 dark:text-green-400 mb-4">✅ Your service is on the way!</h1>
    <p class="text-lg text-gray-700 dark:text-gray-300 mb-2">Estimated arrival time:</p>
    <div class="text-4xl font-bold text-blue-800 dark:text-blue-400 mb-4" id="countdown">2m 00s</div>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Please stay at your current location. Help is arriving shortly.</p>
    
    <!-- Redirect Button -->
    <a href="index.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-xl transition duration-200 shadow-md">
       Back to Main Site
    </a>
  </div>
</body>
</html>
