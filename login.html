<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Helpmefy Login/Signup</title>
  <link href="./output.css" rel="stylesheet" />
  <link rel="icon" href="help4.jpg" type="image/jpg" />
  <style>
    .hover-scale {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .hover-scale:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
  </style>
  <script>
    if (!localStorage.getItem('theme_forced_v3')) {
      localStorage.theme = 'dark';
      localStorage.setItem('theme_forced_v3', 'true');
    }
    if (localStorage.theme === 'light') {
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }
    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        document.documentElement.classList.add('dark');
        localStorage.theme = 'dark';
      }
    }
  </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900 bg-gradient-to-br from-purple-700 to-pink-500 dark:from-gray-900 dark:to-gray-800 transition-colors duration-300">

  <!-- Floating Theme Toggle -->
  <button onclick="toggleTheme()" class="absolute top-6 right-6 bg-white/20 hover:bg-white/40 dark:bg-gray-800/50 dark:hover:bg-gray-700/80 text-white p-3 rounded-full shadow-lg transition backdrop-blur-md">
    <i class="fas fa-moon dark:hidden"></i>
    <i class="fas fa-sun hidden dark:inline text-yellow-400"></i>
  </button>

  <div class="w-full max-w-4xl bg-white dark:bg-gray-800 rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row relative transition-colors duration-300 border border-transparent dark:border-gray-700">

    <!-- Left Panel -->
    <div class="w-full md:w-1/2 bg-gradient-to-br from-purple-800 to-pink-600 dark:from-gray-800 dark:to-gray-900 border-r border-transparent dark:border-gray-700 text-white flex flex-col justify-center items-center p-10 space-y-6 transition-colors duration-300">
      <h1 class="text-4xl font-bold text-center">Welcome to Helpmefy</h1>
      <p class="text-center">Get help, give help — be part of something bigger.</p>
      <button id="toggleForm"
              class="mt-4 bg-white text-purple-700 font-bold px-6 py-2 rounded shadow transition duration-300 hover-scale">
        Switch to Signup
      </button>
    </div>

    <!-- Right Panel (Forms) -->
    <div class="w-full md:w-1/2 px-8 py-12">

      <!-- Login Form -->
      <form id="loginForm" action="afterlogin.html" method="GET" class="space-y-5 transition duration-300 ease-in-out">
        <h2 class="text-3xl font-bold text-purple-700 dark:text-purple-400 mb-4">Login</h2>
        <input type="email" name="email" placeholder="Email"
               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white" required>
        <input type="password" name="password" placeholder="Password"
               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white" required>
        <button type="submit"
                class="w-full bg-purple-600 text-white py-2 rounded transition hover-scale">Login</button>
      </form>
      
      <!-- Signup Form (Hidden Initially) -->
      <form id="signupForm" action="afterlogin.html" method="GET" class="space-y-5 hidden transition duration-300 ease-in-out">
        <h2 class="text-3xl font-bold text-pink-600 dark:text-pink-400 mb-4">Signup</h2>
        <input type="text" name="name" placeholder="Full Name"
               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-pink-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white" required>
        <input type="email" name="email" placeholder="Email"
               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-pink-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white" required>
        <input type="password" name="password" placeholder="Password"
               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-pink-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password"
               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-pink-500 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white" required>
        <button type="submit"
                class="w-full bg-pink-600 text-white py-2 rounded transition hover-scale">Signup</button>
      </form>
      

    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const toggleBtn = document.getElementById('toggleForm');

    let showingLogin = true;

    toggleBtn.addEventListener('click', () => {
      if (showingLogin) {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        toggleBtn.textContent = "Switch to Login";
      } else {
        signupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        toggleBtn.textContent = "Switch to Signup";
      }
      showingLogin = !showingLogin;
    });
  </script>

</body>
</html>
